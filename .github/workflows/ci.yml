name: SwiftPay CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  transaction-gateway:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: transaction-gateway

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests and Coverage
        run: mvn clean verify

      - name: Package Application
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t transaction-gateway:1.0 .

  ledger-service:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ledger-service

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests and Coverage
        run: mvn clean verify

      - name: Package Application
        run: mvn clean package -DskipTests

      - name: Build Docker Image
        run: docker build -t ledger-service:1.0 .