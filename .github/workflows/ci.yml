name: SwiftPay CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  transaction-gateway:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: transaction-gateway

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests And Coverage Check
        run: mvn clean verify

      - name: Build Application
        run: mvn clean package -DskipTests

  ledger-service:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ledger-service

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests And Coverage Check
        run: mvn clean verify

      - name: Build Application
        run: mvn clean package -DskipTests